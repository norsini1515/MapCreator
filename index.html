<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Budget Ledger</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    --ink: #1a1a18;
    --paper: #f5f0e8;
    --cream: #ede8dc;
    --ledger: #2d4a3e;
    --gold: #c8a84b;
    --red: #b84040;
    --rule: rgba(26,26,24,0.15);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--ledger);
    color: var(--paper);
    padding: 2rem 3rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 4px solid var(--gold);
  }
  .logo { display: flex; flex-direction: column; gap: 2px; }
  .logo-title {
    font-family: 'Fraunces', serif;
    font-size: 2rem;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--paper);
  }
  .logo-sub { font-size: 0.65rem; letter-spacing: 0.2em; color: var(--gold); text-transform: uppercase; }

  #connect-btn {
    background: var(--gold);
    color: var(--ink);
    border: none;
    padding: 0.75rem 1.75rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  #connect-btn:hover { opacity: 0.85; }
  #connect-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Main ── */
  main { max-width: 1100px; margin: 0 auto; padding: 2.5rem 2rem; }

  /* ── Status bar ── */
  #status-bar {
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ledger);
    padding: 0.6rem 1rem;
    background: var(--cream);
    border-left: 3px solid var(--gold);
    margin-bottom: 2rem;
    display: none;
  }

  /* ── Accounts row ── */
  #accounts-section { margin-bottom: 2.5rem; display: none; }
  .section-label {
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--ledger);
    margin-bottom: 1rem;
    padding-bottom: 0.4rem;
    border-bottom: 1px solid var(--rule);
  }
  .accounts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; }
  .account-card {
    background: var(--cream);
    border: 1px solid var(--rule);
    padding: 1.25rem 1.5rem;
    position: relative;
    overflow: hidden;
  }
  .account-card::before {
    content: '';
    position: absolute; top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--gold);
  }
  .account-name { font-size: 0.8rem; font-weight: 500; margin-bottom: 0.25rem; }
  .account-type { font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: #777; margin-bottom: 0.75rem; }
  .account-balance { font-family: 'Fraunces', serif; font-size: 1.6rem; font-weight: 300; color: var(--ledger); }

  /* ── Charts row ── */
  #charts-section { margin-bottom: 2.5rem; display: none; }
  .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
  .chart-card { background: var(--cream); border: 1px solid var(--rule); padding: 1.5rem; }
  .chart-card canvas { max-height: 240px; }

  /* ── Transactions table ── */
  #tx-section { display: none; }
  .tx-controls { display: flex; gap: 1rem; margin-bottom: 1rem; align-items: center; flex-wrap: wrap; }
  .tx-controls input, .tx-controls select {
    background: var(--cream);
    border: 1px solid var(--rule);
    padding: 0.5rem 0.9rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: var(--ink);
    outline: none;
  }
  .tx-controls input:focus, .tx-controls select:focus { border-color: var(--gold); }
  #tx-count { font-size: 0.72rem; letter-spacing: 0.08em; color: #777; margin-left: auto; }

  table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
  thead { background: var(--ledger); color: var(--paper); }
  thead th {
    padding: 0.75rem 1rem;
    text-align: left;
    font-weight: 400;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-size: 0.65rem;
  }
  tbody tr { border-bottom: 1px solid var(--rule); transition: background 0.15s; }
  tbody tr:hover { background: var(--cream); }
  tbody td { padding: 0.75rem 1rem; }
  .amount-positive { color: var(--red); }
  .amount-negative { color: var(--ledger); }
  .cat-tag {
    display: inline-block;
    padding: 0.2rem 0.5rem;
    background: rgba(45,74,62,0.08);
    font-size: 0.65rem;
    letter-spacing: 0.06em;
    border-radius: 2px;
  }

  /* ── Empty state ── */
  #empty-state {
    text-align: center;
    padding: 5rem 2rem;
    color: #999;
  }
  #empty-state .big-icon { font-size: 3rem; margin-bottom: 1rem; }
  #empty-state p { font-family: 'Fraunces', serif; font-style: italic; font-size: 1.1rem; margin-bottom: 0.5rem; }
  #empty-state small { font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; }

  /* ── Loading spinner ── */
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--rule);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block; vertical-align: middle; margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 640px) {
    header { padding: 1.25rem 1.25rem; flex-direction: column; gap: 1rem; align-items: flex-start; }
    .charts-grid { grid-template-columns: 1fr; }
    main { padding: 1.5rem 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-title">Budget Ledger</div>
    <div class="logo-sub">Personal Finance Tracker</div>
  </div>
  <button id="connect-btn" onclick="openPlaidLink()">+ Connect Bank</button>
</header>

<main>
  <div id="status-bar"></div>

  <!-- Empty state -->
  <div id="empty-state">
    <div class="big-icon">🏦</div>
    <p>No accounts connected yet.</p>
    <small>Click "Connect Bank" to link your M&amp;T Bank account</small>
  </div>

  <!-- Accounts -->
  <div id="accounts-section">
    <div class="section-label">Linked Accounts</div>
    <div class="accounts-grid" id="accounts-grid"></div>
  </div>

  <!-- Charts -->
  <div id="charts-section">
    <div class="section-label">Spending Overview — Last 90 Days</div>
    <div class="charts-grid">
      <div class="chart-card">
        <canvas id="category-chart"></canvas>
      </div>
      <div class="chart-card">
        <canvas id="monthly-chart"></canvas>
      </div>
    </div>
  </div>

  <!-- Transactions -->
  <div id="tx-section">
    <div class="section-label">Transaction History</div>
    <div class="tx-controls">
      <input type="text" id="search-input" placeholder="Search transactions…" oninput="filterTransactions()"/>
      <select id="cat-filter" onchange="filterTransactions()">
        <option value="">All categories</option>
      </select>
      <span id="tx-count"></span>
    </div>
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Description</th>
          <th>Category</th>
          <th style="text-align:right">Amount</th>
        </tr>
      </thead>
      <tbody id="tx-body"></tbody>
    </table>
  </div>
</main>

<script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js"></script>
<script>
const API = '';   // Flask runs on same origin via Flask static serving
let allTransactions = [];
let categoryChart, monthlyChart;

// ── Plaid Link ─────────────────────────────────────────────────
async function openPlaidLink() {
  setStatus('Initialising Plaid Link…');
  try {
    const res  = await fetch(`${API}/api/create_link_token`, { method: 'POST' });
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    const handler = Plaid.create({
      token: data.link_token,
      onSuccess: async (public_token, metadata) => {
        setStatus('Exchanging token…');
        const ex = await fetch(`${API}/api/exchange_public_token`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ public_token }),
        });
        const exData = await ex.json();
        if (exData.error) throw new Error(exData.error);
        setStatus('Bank linked! Loading data…');
        await loadAll();
      },
      onExit: (err) => { if (err) setStatus('Link exited: ' + err.display_message); else clearStatus(); },
    });
    handler.open();
  } catch (e) { setStatus('Error: ' + e.message); }
}

// ── Load accounts + transactions ───────────────────────────────
async function loadAll() {
  await Promise.all([loadAccounts(), loadTransactions()]);
}

async function loadAccounts() {
  const res  = await fetch(`${API}/api/accounts`);
  const data = await res.json();
  if (data.error) return;

  const grid = document.getElementById('accounts-grid');
  grid.innerHTML = '';
  let totalBalance = 0;
  data.accounts.forEach(a => {
    totalBalance += a.balance || 0;
    grid.innerHTML += `
      <div class="account-card">
        <div class="account-name">${a.name}</div>
        <div class="account-type">${a.type} · ${a.currency}</div>
        <div class="account-balance">${fmt(a.balance)}</div>
      </div>`;
  });
  show('accounts-section');
  hide('empty-state');
  clearStatus();
}

async function loadTransactions() {
  const res  = await fetch(`${API}/api/transactions`);
  const data = await res.json();
  if (data.error || !data.transactions.length) return;

  allTransactions = data.transactions;
  populateCategoryFilter();
  renderTransactions(allTransactions);
  renderCharts(allTransactions);
  show('tx-section');
  show('charts-section');
}

// ── Render helpers ─────────────────────────────────────────────
function renderTransactions(txs) {
  const body = document.getElementById('tx-body');
  body.innerHTML = '';
  txs.forEach(t => {
    const cls    = t.amount > 0 ? 'amount-positive' : 'amount-negative';
    const sign   = t.amount > 0 ? '-' : '+';
    body.innerHTML += `
      <tr>
        <td>${t.date}</td>
        <td>${t.name}</td>
        <td><span class="cat-tag">${t.category}</span></td>
        <td class="${cls}" style="text-align:right">${sign}${fmt(Math.abs(t.amount))}</td>
      </tr>`;
  });
  document.getElementById('tx-count').textContent = `${txs.length} transactions`;
}

function populateCategoryFilter() {
  const cats   = [...new Set(allTransactions.map(t => t.category))].sort();
  const select = document.getElementById('cat-filter');
  select.innerHTML = '<option value="">All categories</option>';
  cats.forEach(c => select.innerHTML += `<option value="${c}">${c}</option>`);
}

function filterTransactions() {
  const q   = document.getElementById('search-input').value.toLowerCase();
  const cat = document.getElementById('cat-filter').value;
  const filtered = allTransactions.filter(t =>
    (!q   || t.name.toLowerCase().includes(q) || t.category.toLowerCase().includes(q)) &&
    (!cat || t.category === cat)
  );
  renderTransactions(filtered);
}

function renderCharts(txs) {
  // Category pie chart
  const catTotals = {};
  txs.filter(t => t.amount > 0).forEach(t => {
    catTotals[t.category] = (catTotals[t.category] || 0) + t.amount;
  });
  const catLabels = Object.keys(catTotals);
  const catValues = Object.values(catTotals);

  if (categoryChart) categoryChart.destroy();
  categoryChart = new Chart(document.getElementById('category-chart'), {
    type: 'doughnut',
    data: {
      labels: catLabels,
      datasets: [{ data: catValues, backgroundColor: palette(catLabels.length), borderWidth: 2, borderColor: '#f5f0e8' }]
    },
    options: {
      plugins: { legend: { position: 'bottom', labels: { font: { family: 'DM Mono', size: 10 }, padding: 12 } },
                 title: { display: true, text: 'Spending by Category', font: { family: 'Fraunces', size: 14 }, color: '#1a1a18' } },
      cutout: '60%',
    }
  });

  // Monthly bar chart
  const monthTotals = {};
  txs.filter(t => t.amount > 0).forEach(t => {
    const m = t.date.slice(0, 7);
    monthTotals[m] = (monthTotals[m] || 0) + t.amount;
  });
  const months = Object.keys(monthTotals).sort();

  if (monthlyChart) monthlyChart.destroy();
  monthlyChart = new Chart(document.getElementById('monthly-chart'), {
    type: 'bar',
    data: {
      labels: months.map(m => { const d = new Date(m+'-01'); return d.toLocaleString('default',{month:'short',year:'2-digit'}); }),
      datasets: [{ label: 'Spending', data: months.map(m => monthTotals[m]), backgroundColor: '#2d4a3e', borderRadius: 2 }]
    },
    options: {
      plugins: { legend: { display: false },
                 title: { display: true, text: 'Monthly Spending', font: { family: 'Fraunces', size: 14 }, color: '#1a1a18' } },
      scales: { y: { ticks: { callback: v => '$'+v.toFixed(0), font: { family: 'DM Mono', size: 10 } } },
                x: { ticks: { font: { family: 'DM Mono', size: 10 } } } }
    }
  });
}

// ── Utilities ──────────────────────────────────────────────────
function fmt(n) { return new Intl.NumberFormat('en-US',{style:'currency',currency:'USD'}).format(n||0); }
function show(id) { document.getElementById(id).style.display = ''; }
function hide(id) { document.getElementById(id).style.display = 'none'; }
function setStatus(msg) {
  const bar = document.getElementById('status-bar');
  bar.innerHTML = `<span class="spinner"></span>${msg}`;
  bar.style.display = 'block';
}
function clearStatus() { document.getElementById('status-bar').style.display = 'none'; }
function palette(n) {
  const base = ['#2d4a3e','#c8a84b','#b84040','#4a7c6f','#8b6914','#7a2e2e','#1e6655','#d4a017','#5c2d2d','#3a6b5e'];
  return Array.from({length: n}, (_,i) => base[i % base.length]);
}
</script>
</body>
</html>
